version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: arteq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arteq
      POSTGRES_PASSWORD: arteq
      POSTGRES_DB: arteq_hospital
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Schema is applied automatically by the app on startup (lifespan), from
      # migrations/versions/*.sql — same path as production. No init mount needed.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arteq -d arteq_hospital"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: arteq_redis
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── App Server ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arteq_app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://arteq:arteq@postgres:5432/arteq_hospital
      DB_SSL: disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./dashboard:/app/dashboard
      - ./migrations:/app/migrations
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # ── LiveKit Agent Worker (Arya) ──────────────────────────
  # Same entrypoint as production (render.yaml worker). Without this service the
  # browser /talk page connects but no agent answers — so dev mirrors prod.
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arteq_agent
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://arteq:arteq@postgres:5432/arteq_hospital
      DB_SSL: disable
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./livekit_agent.py:/app/livekit_agent.py
    command: python livekit_agent.py start

  # ── Prometheus (optional metrics scrape) ─────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: arteq_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
