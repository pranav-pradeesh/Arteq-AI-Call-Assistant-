worker_processes auto;
events { worker_connections 1024; }

http {
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/html text/css application/json application/javascript;

    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

    upstream arteq_app {
        server app:8000;
        keepalive 32;
    }
    upstream arteq_frontend {
        server frontend:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 25m;

        # Larger buffers for next-auth headers/cookies.
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;

        # ── Backend: versioned API (health, auth, webhooks) ──────────
        location /api/v1/ {
            proxy_pass http://arteq_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Backend: WebSocket live-call monitoring ──────────────────
        location /ws/ {
            proxy_pass http://arteq_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }
        location /rtc {
            proxy_pass http://arteq_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ── Rate-limit the credentials login callback ────────────────
        location = /api/auth/callback/credentials {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://arteq_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Everything else → Next.js dashboard ──────────────────────
        # Next.js proxies /admin/api/* -> backend /admin/* via its rewrites,
        # and serves /, /login, /overview, /api/auth/* (next-auth), /_next/*.
        location / {
            proxy_pass http://arteq_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout    300s;
        }
    }
}
