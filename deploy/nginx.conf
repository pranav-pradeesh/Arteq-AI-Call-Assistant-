worker_processes auto;
events { worker_connections 1024; }

http {
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/html text/css application/json application/javascript;

    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

    # Docker's embedded DNS. Using a resolver + variable upstreams forces nginx
    # to re-resolve service IPs at request time, so recreating the app/frontend
    # containers (e.g. during a redeploy) does NOT leave nginx on a stale IP.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;
        client_max_body_size 25m;

        proxy_buffer_size 16k;
        proxy_buffers 8 16k;

        # ── Backend: versioned API (health, auth, webhooks) ──────────
        location /api/v1/ {
            set $backend http://app:8000;
            proxy_pass $backend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Backend: WebSocket live-call monitoring + RTC ────────────
        location /ws/ {
            set $backend http://app:8000;
            proxy_pass $backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }
        # ── Backend: dashboard live-call WebSocket (/admin/ws/live) ──
        # Must beat the catch-all '/' (which goes to Next.js, where WS upgrade
        # fails) — the agent publishes call events via Redis, this WS forwards them.
        location /admin/ws/ {
            set $backend http://app:8000;
            proxy_pass $backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }
                location /rtc {
            set $backend http://app:8000;
            proxy_pass $backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ── Rate-limit the credentials login callback ────────────────
        location = /api/auth/callback/credentials {
            limit_req zone=auth_limit burst=10 nodelay;
            set $frontend http://frontend:3000;
            proxy_pass $frontend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Everything else → Next.js dashboard ──────────────────────
        location / {
            set $frontend http://frontend:3000;
            proxy_pass $frontend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout    300s;
        }
    }
}
