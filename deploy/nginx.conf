# Nginx reverse proxy for Arteq multi-hospital VPS.
# All hospitals share one domain; routing is by hospital slug inside the app.
#
# TLS: place fullchain.pem + privkey.pem in the nginx_certs Docker volume.
# Use Certbot (Let's Encrypt) or copy your cert files manually.
# Without certs, comment out the HTTPS server block and use HTTP only for LAN.

worker_processes auto;
events { worker_connections 1024; }

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Gzip for dashboard assets
    gzip on;
    gzip_types text/html text/css application/json application/javascript;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Permissions-Policy "microphone=(), camera=()";

    # Rate limit: 60 requests/min per IP on auth endpoints
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    upstream arteq_app {
        server app:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        client_max_body_size 10m;

        # Rate-limit login endpoints against brute force
        location ~ ^/(admin/login|api/v1/auth/login) {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://arteq_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket for LiveKit browser client and agent streaming
        location /rtc {
            proxy_pass http://arteq_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # General proxy — all other routes
        location / {
            proxy_pass http://arteq_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
