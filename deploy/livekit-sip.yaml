# LiveKit SIP bridge config. Bridges Vobiz SIP calls into LiveKit rooms.
# api_key / api_secret are injected from env (SIP_API_KEY / SIP_API_SECRET) to
# match the keys the main server accepts.
ws_url: ws://livekit:7880
redis:
  address: redis:6379
sip_port: 5060
rtp_port: 10000-10100
use_external_ip: true   # advertise public IP for SIP RTP media
logging:
  level: info
  json: false
