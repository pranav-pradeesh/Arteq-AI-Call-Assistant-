services:
  - type: web
    name: arteq-voice-agent
    runtime: python
    plan: starter
    region: singapore
    branch: claude/hospital-voice-agent-ml-XCG0G
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      # Pin Python (default is 3.14 which has no pydantic-core wheel)
      - key: PYTHON_VERSION
        value: 3.11.10

      # Non-secret runtime config
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: HOSPITAL_ID
        value: 00000000-0000-0000-0000-000000000001
      - key: TELEPHONY_MODE
        value: stream

      # AI stack — Sarvam STT/TTS + Groq LLaMA brain
      - key: STT_PROVIDER
        value: sarvam
      - key: TTS_PROVIDER
        value: sarvam
      - key: DEFAULT_LANGUAGE
        value: ml-IN

      # Persona
      - key: AGENT_NAME
        value: Arya
      - key: AGENT_LANGUAGE
        value: ml-IN

      # Session / cache
      - key: SESSION_TTL_S
        value: "300"
      - key: CACHE_MAX_SIZE
        value: "512"
      - key: REDIS_URL
        value: ""

      # Secrets — set these in Render dashboard (sync: false = prompt on deploy)
      - key: SARVAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PLIVO_AUTH_ID
        sync: false
      - key: PLIVO_AUTH_TOKEN
        sync: false
      - key: PLIVO_PHONE_NUMBER
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: DASHBOARD_ADMIN_PASSWORD
        sync: false
      - key: DASHBOARD_JWT_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false

      # Non-secret outbound / scheduler config
      - key: REMINDERS_ENABLED
        value: "true"
      - key: REMINDER_INTERVAL_SECONDS
        value: "900"
      - key: CONFIRMATIONS_ENABLED
        value: "true"
      - key: CONFIRMATION_LOOP_INTERVAL_SECONDS
        value: "900"
      - key: CONFIRMATION_DAYS_MIN
        value: "1"
      - key: CONFIRMATION_DAYS_MAX
        value: "7"
      - key: CALLBACKS_ENABLED
        value: "true"
      - key: CALLBACK_LOOP_INTERVAL_SECONDS
        value: "300"
      - key: FOLLOWUPS_ENABLED
        value: "false"
      - key: FOLLOWUP_LOOP_INTERVAL_SECONDS
        value: "3600"
      - key: FOLLOWUP_DAYS_AFTER
        value: "3"

      # Staff alerts
      - key: STAFF_ALERT_ON_BOOKING
        value: "true"
      - key: STAFF_ALERT_ON_CANCEL
        value: "true"
      - key: STAFF_ALERT_ON_EMERGENCY
        value: "true"
      - key: STAFF_ALERT_PHONE
        sync: false

      # Public URL — set AFTER first deploy completes
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PUBLIC_WS_URL
        sync: false
      - key: LIVEKIT_SIP_HOST
        sync: false
      - key: LIVEKIT_SIP_OUTBOUND_TRUNK_ID
        sync: false

  # ── LiveKit voice agent worker ─────────────────────────────────────────────
  # Runs the AI agent pool that handles every concurrent call room.
  # Scale this service up (more instances) for higher call volumes.
  - type: worker
    name: arteq-livekit-agent
    runtime: python
    plan: starter
    region: singapore
    branch: claude/hospital-voice-agent-ml-XCG0G
    buildCommand: pip install -r requirements.txt
    startCommand: python livekit_agent.py start
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: AGENT_NAME
        value: Arya
      - key: DEFAULT_LANGUAGE
        value: ml-IN
      - key: HOSPITAL_ID
        value: 00000000-0000-0000-0000-000000000001
      # Secrets — same values as the web service
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PLIVO_AUTH_ID
        sync: false
      - key: PLIVO_AUTH_TOKEN
        sync: false
      - key: PLIVO_PHONE_NUMBER
        sync: false
      - key: STAFF_ALERT_PHONE
        sync: false
