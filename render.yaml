services:
  - type: web
    name: arteq-voice-agent
    runtime: python
    plan: free
    region: singapore
    branch: claude/hospital-voice-agent-ml-XCG0G
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      # Pin Python (default is 3.14 which has no pydantic-core wheel)
      - key: PYTHON_VERSION
        value: 3.11.10

      # Non-secret runtime config
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: HOSPITAL_ID
        value: 00000000-0000-0000-0000-000000000001
      - key: TELEPHONY_MODE
        value: stream

      # AI stack — Sarvam STT/TTS + Groq LLaMA brain
      - key: STT_PROVIDER
        value: sarvam
      - key: TTS_PROVIDER
        value: sarvam
      - key: DEFAULT_LANGUAGE
        value: ml-IN

      # Persona
      - key: AGENT_NAME
        value: Arya
      - key: AGENT_LANGUAGE
        value: ml-IN

      # Session / cache
      - key: SESSION_TTL_S
        value: "300"
      - key: CACHE_MAX_SIZE
        value: "512"
      - key: REDIS_URL
        value: ""

      # Secrets — set these in Render dashboard (sync: false = prompt on deploy)
      - key: SARVAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: EXOTEL_SID
        sync: false
      - key: EXOTEL_API_KEY
        sync: false
      - key: EXOTEL_API_TOKEN
        sync: false
      - key: EXOTEL_CALLER_ID
        sync: false
      - key: INTERNAL_API_KEY
        sync: false

      # Non-secret outbound config
      - key: EXOTEL_SUBDOMAIN
        value: api.exotel.com
      - key: REMINDERS_ENABLED
        value: "true"
      - key: REMINDER_INTERVAL_SECONDS
        value: "900"

      # Public URL — set AFTER first deploy completes
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PUBLIC_WS_URL
        sync: false
