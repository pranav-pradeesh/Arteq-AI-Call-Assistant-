# Self-host stack — multiple hospitals on ONE VPS.
#
# Architecture:
#   Nginx (reverse proxy, TLS termination) → app (FastAPI)
#   LiveKit server + SIP service (self-hosted, no LiveKit Cloud fee)
#   PostgreSQL + Redis (shared by all hospitals)
#   One LiveKit agent worker handles all hospital rooms concurrently
#
# Quick start:
#   1. Copy .env.example → .env and fill required secrets.
#   2. Set NODE_IP to your VPS public IP (needed for WebRTC media).
#   3. Set DOMAIN to your VPS domain/IP for Nginx (e.g. arteq.yourdomain.com).
#   4. docker compose -f docker-compose.selfhost.yml up -d
#   5. POST /admin/sip/vobiz/setup  (creates LiveKit SIP trunks for Vobiz)
#
# Adding a new hospital:
#   POST /admin/hospitals/wizard  (name, slug, departments, doctors, etc.)
#   No restart needed — routing is purely data-driven via the hospital slug.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────
  # Credentials are read from .env (POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB).
  # Set POSTGRES_PASSWORD in .env before starting — the container will not init
  # without it. Passing via env_file avoids hardcoded values in this file.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-arteq} -d $${POSTGRES_DB:-arteq_hospital}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── LiveKit Server (self-hosted, replaces LiveKit Cloud) ────────
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /etc/livekit.yaml --node-ip ${NODE_IP:?Set NODE_IP to VPS public IP}
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:?Set LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET:?Set LIVEKIT_API_SECRET}"
    volumes:
      - ./deploy/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"                        # WebSocket signaling
      - "7881:7881"                        # RTC TCP
      - "50000-50200:50000-50200/udp"      # RTC media (open in firewall)
    depends_on:
      redis:
        condition: service_healthy

  # ── LiveKit SIP (Vobiz trunk bridge) ───────────────────────────
  livekit-sip:
    image: livekit/sip:latest
    restart: unless-stopped
    # Config via SIP_CONFIG_BODY so the api_key/secret come from .env (not git).
    # Without these the SIP service cannot create/update call rooms ("missing API
    # key or secret key") — breaking both inbound and outbound calls.
    environment:
      SIP_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        redis:
          address: redis:6379
        sip_port: 5060
        rtp_port: 10000-10100
        use_external_ip: true
        logging:
          level: info
          json: false
    ports:
      - "5060:5060/udp"                   # SIP signaling from Vobiz
      - "10000-10100:10000-10100/udp"     # SIP RTP media
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy

  # ── Arteq API Server ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    # DATABASE_URL is constructed by the app from .env values; override host to
    # use the docker service name instead of the external host in your .env.
    environment:
      DB_SSL: require
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LIVEKIT_URL: ws://livekit:7880
    expose:
      - "8000"
    extra_hosts:
      - "db.vkvpgrlzbjahhrlqxbvg.supabase.co:172.18.0.1"
    volumes:
      - recordings:/recordings:ro
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Arya Agent Worker ───────────────────────────────────────────
  # Handles all hospital rooms concurrently. Scale by adding replicas.
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_SSL: require
      LIVEKIT_URL: ws://livekit:7880
    extra_hosts:
      - "db.vkvpgrlzbjahhrlqxbvg.supabase.co:172.18.0.1"
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    command: python livekit_agent.py start

  # ── Next.js Admin Dashboard ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: http://app:8000
    image: arteq-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: http://app:8000
      NEXTAUTH_URL: http://187.127.153.87
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    depends_on:
      app:
        condition: service_started

  # ── Nginx reverse proxy + TLS ──────────────────────────────────
  # Terminates HTTPS, proxies /admin, /api/v1, /talk, /ws to the app.
  # All hospitals share the same domain — routing is by slug in the URL/room name.
  # ── LiveKit Egress (call recording -> local file, admin-only) ──
  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    environment:
      EGRESS_CONFIG_BODY: |
        redis:
          address: redis:6379
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        cpu_cost:
          room_composite_cpu_cost: 1.5
          web_cpu_cost: 1.5
          track_composite_cpu_cost: 1.0
          track_cpu_cost: 0.5
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    shm_size: 1gb
    volumes:
      - recordings:/recordings
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs         # mount TLS certs here
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_started
      frontend:
        condition: service_started

  # ── Prometheus (optional) ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app
    profiles:
      - monitoring

volumes:
  recordings:
  postgres_data:
  redis_data:
  nginx_certs:
  nginx_logs:
  prometheus_data:
