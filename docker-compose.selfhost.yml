# Self-host stack — everything on ONE VPS (PRICING_PLANS.md §4a).
#   postgres + redis + livekit-server + livekit-sip + app (web) + agent (Arya)
#
# This replaces LiveKit Cloud with the open-source server, dropping the
# ~₹1.20/min voice-infra cost to the price of the box. The app and agent are
# unchanged — only LIVEKIT_URL/keys point at the local server.
#
# One-time before `docker compose -f docker-compose.selfhost.yml up -d`:
#   1. Copy .env.selfhost.example → .env and fill secrets (Sarvam, Groq, Plivo,
#      DB password, dashboard secrets, and a LIVEKIT_API_KEY/SECRET pair).
#   2. Set NODE_IP to the VPS public IP so WebRTC media is reachable.
#   3. After it's up, run POST /admin/sip/setup to create the Plivo trunks.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arteq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arteq}
      POSTGRES_DB: ${POSTGRES_DB:-arteq_hospital}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arteq} -d ${POSTGRES_DB:-arteq_hospital}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /etc/livekit.yaml --node-ip ${NODE_IP}
    environment:
      # "key: secret" — must match LIVEKIT_API_KEY/SECRET used by app + agent.
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./deploy/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"      # signaling (ws)
      - "7881:7881"      # rtc tcp
      - "50000-50200:50000-50200/udp"  # rtc media
    depends_on:
      redis:
        condition: service_healthy

  livekit-sip:
    image: livekit/sip:latest
    restart: unless-stopped
    command: --config /etc/livekit-sip.yaml
    environment:
      SIP_API_KEY: ${LIVEKIT_API_KEY}
      SIP_API_SECRET: ${LIVEKIT_API_SECRET}
    volumes:
      - ./deploy/livekit-sip.yaml:/etc/livekit-sip.yaml:ro
    ports:
      - "5060:5060/udp"             # SIP signaling from Plivo
      - "10000-10100:10000-10100/udp"  # SIP rtp
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-arteq}:${POSTGRES_PASSWORD:-arteq}@postgres:5432/${POSTGRES_DB:-arteq_hospital}
      DB_SSL: disable
      REDIS_URL: redis://redis:6379/0
      LIVEKIT_URL: ws://livekit:7880
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-arteq}:${POSTGRES_PASSWORD:-arteq}@postgres:5432/${POSTGRES_DB:-arteq_hospital}
      DB_SSL: disable
      LIVEKIT_URL: ws://livekit:7880
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    command: python livekit_agent.py start

volumes:
  postgres_data:
  redis_data:
